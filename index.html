<!DOCTYPE html>
<!--
Modified by Jingcheng for personal customized fireworks page.
Based on Firework_Simulator by NianBroken (Apache-2.0).
Mobile-first for WeChat / iOS Safari / Android Chrome.
-->
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<title>烟花</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="format-detection" content="telephone=no" />
		<meta name="theme-color" content="#050714" />
		<link rel="shortcut icon" type="image/png" href="./images/favicon.png" />
		<link rel="icon" type="image/png" href="./images/favicon.png" />
		<link rel="apple-touch-icon-precomposed" href="./images/favicon.png" />
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<div class="container">
			<div class="stage-container">
				<div class="canvas-container">
					<canvas id="sky-canvas"></canvas>
					<canvas id="trails-canvas"></canvas>
					<canvas id="main-canvas"></canvas>
				</div>

				<div class="hero-overlay" id="hero-overlay">
					<p class="hero-title">今晚的烟花，只为你点亮。</p>
					<p class="hero-hint">点击夜空，放一束烟花</p>
				</div>

				<div class="minimal-controls">
					<button class="ctrl-btn" type="button" id="btn-auto">自动烟花：开</button>
					<button class="ctrl-btn" type="button" id="btn-sound">音效：关</button>
					<button class="ctrl-btn" type="button" id="btn-clear">清空</button>
				</div>
			</div>

			<div class="license-credits" aria-hidden="true">
				<p>
					Copyright &copy; 2021 - <span class="copyright-year"></span>
					<a target="_blank" href="https://www.nianbroken.top/" rel="noopener">碎念_Nian</a>
					&middot; Modified by Jingcheng
				</p>
			</div>
		</div>

		<script src="./js/lib/Stage.js"></script>
		<script src="./js/lib/MyMath.js"></script>
		<script src="./js/app/config.js"></script>
		<script src="./js/app/mobile-viewport.js"></script>
		<script src="./js/app/store.js"></script>
		<script src="./js/app/performance.js"></script>
		<script src="./js/app/sky-background.js"></script>
		<script src="./js/app/minimal-ui.js"></script>
		<script src="./js/app/background-manager.js"></script>
		<script src="./js/fireworks/runtime.js"></script>
		<script src="./js/fireworks/shells.js"></script>
		<script src="./js/fireworks/interaction.js"></script>
		<script src="./js/fireworks/simulation.js"></script>
		<script src="./js/fireworks/audio.js"></script>
		<script src="./js/fireworks/engine.js"></script>
	</body>
</html>
